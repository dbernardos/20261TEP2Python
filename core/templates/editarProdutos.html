{% extends 'global/base.html' %}

{% block title %}
  Editar Produto
{% endblock %}

{% block content %}
    <div class="container">
        <h1>Edição de produtos</h1>
        
        <form method="POST">
            {% csrf_token %}
            <table class="table table-hover">
                {{ form.as_table }}
            </table>
            <input type="submit" value="Salvar" class="btn btn-success">
        </form>
    </div>
{%endblock%}
